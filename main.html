<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Среќен Роденден ❤️</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#0f0f0f;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      text-align:center;
    }

    .container{
      padding:20px;
    }

    h1{
      font-size:32px;
      margin-bottom:10px;
    }

    p{
      font-size:18px;
      opacity:0.9;
    }

    button{
      margin-top:30px;
      padding:15px 30px;
      font-size:18px;
      border:none;
      border-radius:10px;
      background:#ff4d6d;
      color:white;
    }

    #videoContainer{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:black;
      display:none;
    }

    video{
      width:100%;
      height:100%;
      object-fit:contain;
    }
  </style>
</head>

<body>

<div class="container" id="start">
  <h1>Среќен Роденден љубов моја ❤️</h1>

  <p>
    Фала ти што секогаш си покрај мене,
    што ме правиш посреќен секој ден
    и што го правиш мојот живот поубав.
  </p>

  <p style="margin-top:25px;">
    Подготвена ли си за твојот мал видео подарок? 🎁
  </p>

  <button onclick="playVideo()">Да ❤️</button>
</div>

<div id="videoContainer">
  <video id="birthdayVideo" controls autoplay>
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<script>
  function playVideo(){
    document.getElementById("start").style.display="none";
    document.getElementById("videoContainer").style.display="block";
  }
</script>

</body>
</html>
